<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">

    <title>CSC Form</title>

    <!-- Font style: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Styles -->
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }

        @keyframes windowOpen {
            0% {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .animate-window {
            animation: windowOpen 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes blob {
            0% {
                transform: translate(0px, 0px) scale(1);
            }

            33% {
                transform: translate(30px, -50px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }

            100% {
                transform: translate(0px, 0px) scale(1);
            }
        }

        .animate-blob {
            animation: blob 10s infinite alternate;
        }

        .animation-delay-2000 {
            animation-delay: 2s;
        }

        .animation-delay-4000 {
            animation-delay: 4s;
        }
    </style>
</head>

<!-- BODY -->
<!-- background -->

<body class="bg-slate-50 relative overflow-x-hidden min-h-screen">

    <!-- SPLASH SCREEN -->
    <div id="splash"
        class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-white/30 backdrop-blur-2xl transition-opacity duration-500 p-4">
        <h1
            class="text-3xl sm:text-5xl px-4 font-bold tracking-widest text-center text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-red-600 drop-shadow-sm mb-4">
            Civil Service Commission Form 212</h1>
        <h2
            class="text-xl sm:text-2xl px-4 font-bold tracking-widest text-center justify-center text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-red-600 drop-shadow-sm mb-8">
            Information Management</h2>
        <h3
            class="text-lg sm:text-xl font-bold tracking-widest text-center justify-center text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-red-600 drop-shadow-sm mb-8">
            Group 9</h3>

        <button onclick="hideSplash()"
            class="group relative px-8 py-3 font-semibold text-white rounded-full overflow-hidden shadow-lg hover:scale-105 transition-all duration-500">
            <!-- Gradient background border -->
            <div class="absolute inset-0 bg-gradient-to-r from-blue-600 to-red-600"></div>
            <!-- White background for hover -->
            <div
                class="absolute inset-[2px] bg-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity duration-500">
            </div>
            <!-- Text -->
            <span
                class="relative z-10 transition-all duration-500 group-hover:text-transparent group-hover:bg-clip-text group-hover:bg-gradient-to-r group-hover:from-blue-600 group-hover:to-red-600">Go
                to Form</span>
        </button>
    </div>

    <!-- gradient blobs -->
    <div
        class="absolute top-0 left-[-10%] w-96 h-96 bg-blue-400 rounded-full mix-blend-multiply filter blur-[100px] opacity-70 animate-blob">
    </div>
    <div
        class="absolute top-[20%] right-[-10%] w-96 h-96 bg-red-400 rounded-full mix-blend-multiply filter blur-[100px] opacity-70 animate-blob animation-delay-2000">
    </div>
    <div
        class="absolute bottom-[-20%] left-[20%] w-96 h-96 bg-blue-300 rounded-full mix-blend-multiply filter blur-[100px] opacity-70 animate-blob animation-delay-4000">
    </div>

    <!-- FORM WRAPPER -->
    <div class="relative z-10 flex min-h-screen w-full items-center justify-center p-4 sm:p-10 py-12">
        <div id="mainForm"
            class="w-full max-w-lg bg-white/70 backdrop-blur-2xl border border-white p-6 sm:p-10 rounded-2xl shadow-2xl opacity-0">

        <!-- title -->
        <h1 class="text-2xl font-bold mb-6">CSC Form 212</h1>

        <!-- personal information -->
        <h2 class="font-semibold mb-2">Personal Information</h2>
        <input id="surName" placeholder="Surname" class="w-full border p-2 rounded mb-3" />
        <input id="firstName" placeholder="First Name" class="w-full border p-2 rounded mb-3" />
        <input id="middleName" placeholder="Middle Name" class="w-full border p-2 rounded mb-3" />
        <input id="nameExtension" placeholder="Name Extension (Jr, Sr)" class="w-full border p-2 rounded mb-3" />

        <h2 class="font-semibold mb-2 mt-4">Educational Background</h2>
        <input id="educLevel" placeholder="Education Level" class="w-full border p-2 rounded mb-3" />
        <input id="schoolName" placeholder="School Name" class="w-full border p-2 rounded mb-3" />
        <input id="degreeCourse" placeholder="Degree/Course" class="w-full border p-2 rounded mb-3" />

        <!-- submit button -->
        <button onclick="submitForm()"
            class="group relative w-full mt-5 p-3 font-semibold text-white rounded-2xl overflow-hidden shadow-lg hover:scale-[1.02] transition-all duration-500">
            <!-- Gradient background border -->
            <div class="absolute inset-0 bg-gradient-to-r from-blue-600 to-red-600"></div>

            <!-- White background for hover -->
            <div
                class="absolute inset-[2px] bg-white rounded-xl opacity-0 group-hover:opacity-100 transition-opacity duration-500">
            </div>

            <!-- Text -->
            <span
                class="relative z-10 transition-all duration-500 group-hover:text-transparent group-hover:bg-clip-text group-hover:bg-gradient-to-r group-hover:from-blue-600 group-hover:to-red-600">Submit</span>
        </button>

        <!-- message prompt for success/error -->
        <p id="message" class="mt-4 text-center text-green-600"></p>
        </div>
    </div>


    <!-- JAVASCRIPT -->
    <!-- for fetching data -->
    <script>
        async function submitForm() {
            const data = {
                surName: document.getElementById('surName').value,
                firstName: document.getElementById('firstName').value,
                middleName: document.getElementById('middleName').value,
                nameExtension: document.getElementById('nameExtension').value,
                educLevel: document.getElementById('educLevel').value,
                schoolName: document.getElementById('schoolName').value,
                degreeCourse: document.getElementById('degreeCourse').value,
            };

            // using fetch api to send data to the server (render)
            try {
                const res = await fetch('https://csc-form-212.onrender.com/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                // basic ui/ux to show if the form was submitted successfully or not
                const result = await res.json();
                // if res.ok means the form was submitted successfully
                if (res.ok) {
                    document.getElementById('message').textContent = result.message;
                    document.getElementById('message').className = "mt-4 text-center text-green-600";

                    // clear inputs after successful submission
                    document.querySelectorAll('input').forEach(input => input.value = '');
                } else {
                    document.getElementById('message').textContent = "Error: " + (result.error || "Unknown error occurred.");
                    document.getElementById('message').className = "mt-4 text-center text-red-600";
                }
            } catch (err) {
                // error catching
                document.getElementById('message').textContent = "Error: Could not connect to server.";
                document.getElementById('message').className = "mt-4 text-center text-red-600";
            }
        }

        function hideSplash() {
            const splash = document.getElementById('splash');
            const form = document.getElementById('mainForm');

            splash.style.opacity = "0";

            setTimeout(() => {
                splash.style.display = "none";
                form.classList.add('animate-window');
            }, 500);
        }
    </script>

</body>

</html>
